<section class="app-surface">
  <div class="mb-4 flex flex-col gap-3 2xl:flex-row 2xl:items-end 2xl:justify-between">
    <div class="grid flex-1 gap-3 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-5">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Device</mat-label>
        <mat-select [(ngModel)]="selectedDeviceId">
          <mat-option [value]="undefined">All devices</mat-option>
          <mat-option *ngFor="let device of devices" [value]="device.device_id">
            {{ device.device_name || ('Device ' + device.device_id) }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Metric</mat-label>
        <input matInput type="text" [(ngModel)]="metricName" placeholder="All metrics (exact match)" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Device Name Filter</mat-label>
        <input matInput type="text" [(ngModel)]="deviceNameFilter" placeholder="Contains..." />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Start Date</mat-label>
        <input matInput [matDatepicker]="startDatePicker" [(ngModel)]="startDate" (click)="startDatePicker.open()" readonly />
        <mat-datepicker-toggle matIconSuffix [for]="startDatePicker" />
        <mat-datepicker #startDatePicker />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Start Time</mat-label>
        <input matInput type="time" [(ngModel)]="startTime" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>End Date</mat-label>
        <input matInput [matDatepicker]="endDatePicker" [(ngModel)]="endDate" (click)="endDatePicker.open()" readonly />
        <mat-datepicker-toggle matIconSuffix [for]="endDatePicker" />
        <mat-datepicker #endDatePicker />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>End Time</mat-label>
        <input matInput type="time" [(ngModel)]="endTime" />
      </mat-form-field>
    </div>

    <button mat-flat-button color="primary" type="button" (click)="refresh()" aria-label="Refresh raw telemetry">
      Refresh
    </button>
  </div>

  <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>
  <div class="status-text flex items-center gap-2" *ngIf="loading">
    <mat-spinner [diameter]="20" />
    <span>Loading raw telemetry...</span>
  </div>

  <ag-grid-angular
    class="telemetry-grid w-full"
    [class.ag-theme-alpine]="themeService.theme() === 'light'"
    [class.ag-theme-alpine-dark]="themeService.theme() === 'dark'"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [animateRows]="true"
    (gridReady)="onGridReady($event)"
    (sortChanged)="onSortChanged($event)"
  ></ag-grid-angular>

  <div class="mt-4 flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
    <div class="flex flex-wrap items-center gap-2">
      <button mat-stroked-button type="button" (click)="firstPage()" [disabled]="page <= 1">First</button>
      <button mat-stroked-button type="button" (click)="previousPage()" [disabled]="page <= 1">Previous</button>

      <button
        mat-stroked-button
        type="button"
        *ngFor="let pageNumber of visiblePages"
        [color]="pageNumber === page ? 'primary' : undefined"
        (click)="goToPage(pageNumber)"
      >
        {{ pageNumber }}
      </button>

      <button mat-stroked-button type="button" (click)="nextPage()" [disabled]="page >= totalPages">Next</button>
      <button mat-stroked-button type="button" (click)="lastPage()" [disabled]="page >= totalPages">Last</button>
    </div>

    <div class="flex flex-wrap items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
      <span>Page {{ page }} / {{ totalPages || 1 }} | Total Rows: {{ totalRows }}</span>
      <mat-form-field appearance="outline" class="w-36">
        <mat-label>Go to page</mat-label>
        <input
          matInput
          type="number"
          min="1"
          [max]="totalPages || 1"
          [(ngModel)]="pageJumpValue"
          (keyup.enter)="jumpToPage()"
        />
      </mat-form-field>
      <button mat-flat-button color="primary" type="button" (click)="jumpToPage()">Go</button>
    </div>
  </div>
</section>
