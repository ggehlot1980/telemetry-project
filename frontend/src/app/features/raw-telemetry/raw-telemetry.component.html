<section class="panel">
  <div class="controls">
    <div class="filters">
      <label>
        Device
        <select [(ngModel)]="selectedDeviceId">
          <option [ngValue]="undefined">All devices</option>
          <option *ngFor="let device of devices" [ngValue]="device.device_id">
            {{ device.device_name || ('Device ' + device.device_id) }}
          </option>
        </select>
      </label>

      <label>
        Metric
        <input type="text" [(ngModel)]="metricName" placeholder="All metrics (exact match)" />
      </label>

      <label>
        Device name filter
        <input type="text" [(ngModel)]="deviceNameFilter" placeholder="Contains..." />
      </label>

      <label>
        Start
        <input type="datetime-local" [(ngModel)]="startTime" />
      </label>

      <label>
        End
        <input type="datetime-local" [(ngModel)]="endTime" />
      </label>
    </div>

    <button type="button" class="refresh-button" (click)="refresh()" aria-label="Refresh raw telemetry">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
        ></path>
      </svg>
    </button>
  </div>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  <p class="status" *ngIf="loading">Loading raw telemetry...</p>

  <ag-grid-angular
    class="ag-theme-alpine grid"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [animateRows]="true"
    (gridReady)="onGridReady($event)"
    (sortChanged)="onSortChanged($event)"
  ></ag-grid-angular>

  <div class="pagination">
    <div class="pager-controls">
      <button type="button" (click)="firstPage()" [disabled]="page <= 1">First</button>
      <button type="button" (click)="previousPage()" [disabled]="page <= 1">Previous</button>

      <button
        type="button"
        class="page-number"
        *ngFor="let pageNumber of visiblePages"
        [class.active]="pageNumber === page"
        (click)="goToPage(pageNumber)"
      >
        {{ pageNumber }}
      </button>

      <button type="button" (click)="nextPage()" [disabled]="page >= totalPages">Next</button>
      <button type="button" (click)="lastPage()" [disabled]="page >= totalPages">Last</button>
    </div>

    <div class="pager-jump">
      <span>Page {{ page }} / {{ totalPages || 1 }} | Total Rows: {{ totalRows }}</span>
      <input
        type="number"
        min="1"
        [max]="totalPages || 1"
        [(ngModel)]="pageJumpValue"
        (keyup.enter)="jumpToPage()"
        placeholder="Go to page"
      />
      <button type="button" (click)="jumpToPage()">Go</button>
    </div>
  </div>
</section>
