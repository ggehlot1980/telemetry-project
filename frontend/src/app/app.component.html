<div class="min-h-screen bg-slate-100 text-slate-900 transition-colors dark:bg-slate-950 dark:text-slate-100">
  <mat-toolbar class="!h-auto !bg-white !px-4 !py-3 !text-slate-900 shadow-sm dark:!bg-slate-900 dark:!text-slate-100">
    <div class="mx-auto flex w-full max-w-[1440px] flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
      <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:gap-4">
        <h1 class="m-0 text-xl font-semibold">Telemetry Analytics</h1>
        <nav class="flex flex-wrap items-center gap-2">
          <a
            mat-stroked-button
            routerLink="/"
            routerLinkActive="active-nav-link"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Dashboard
          </a>
          <a mat-stroked-button routerLink="/raw-telemetry" routerLinkActive="active-nav-link">Raw Telemetry</a>
        </nav>
      </div>

      <mat-button-toggle-group
        [value]="themeService.theme()"
        (change)="onThemeChange($event)"
        appearance="legacy"
        aria-label="Theme switcher"
      >
        <mat-button-toggle value="light">Light</mat-button-toggle>
        <mat-button-toggle value="dark">Dark</mat-button-toggle>
      </mat-button-toggle-group>
    </div>
  </mat-toolbar>

  <main class="mx-auto w-full max-w-[1440px] p-4">
    <router-outlet />
  </main>
</div>
